name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write  # create the release and upload artifacts

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: nlmclean-${{ github.ref_name }}-windows-x64.zip
          - os: macos-14      # Apple Silicon (arm64)
            artifact: nlmclean-${{ github.ref_name }}-macos-arm64.dmg
          - os: macos-13      # Intel (x86_64)
            artifact: nlmclean-${{ github.ref_name }}-macos-intel.dmg
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      # pikepdf has no prebuilt macOS-Intel wheel, so it compiles from source and
      # needs the qpdf headers. Harmless on arm64 (uses a wheel). Persist the
      # discovery paths so the pip step below can find qpdf.
      - name: Install qpdf (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install qpdf
          echo "CMAKE_PREFIX_PATH=$(brew --prefix qpdf)" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_PATH=$(brew --prefix qpdf)/lib/pkgconfig" >> "$GITHUB_ENV"

      - name: Install
        run: pip install -e .[dev]

      - name: Check tag matches package version
        shell: python
        run: |
          import os, nlmclean
          tag = os.environ["GITHUB_REF_NAME"].lstrip("v")
          assert tag == nlmclean.__version__, f"tag {tag} != version {nlmclean.__version__}"

      - name: Bundle static ffmpeg
        run: python packaging/fetch_ffmpeg.py

      - name: Build
        run: pyinstaller packaging/nlmclean.spec --noconfirm

      - name: Package (Windows zip)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path dist/nlmclean -DestinationPath ${{ matrix.artifact }}

      # Inno Setup (iscc) is preinstalled on the windows-latest runner image.
      # Wraps the bundle into an installer; /F overrides the output basename so it
      # carries the tag (OutputDir is dist\, set in the .iss).
      - name: Package (Windows installer)
        if: runner.os == 'Windows'
        run: iscc packaging\windows_installer.iss /F"nlmclean-${{ github.ref_name }}-windows-setup"

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: bash packaging/make_dmg.sh ${{ matrix.artifact }}

      - name: Upload release artifact
        uses: softprops/action-gh-release@v2
        with:
          # The installer pattern matches nothing on macOS runners; softprops
          # does not fail on unmatched patterns by default.
          files: |
            ${{ matrix.artifact }}
            dist/nlmclean-${{ github.ref_name }}-windows-setup.exe
          draft: true
